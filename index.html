<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TESTING DEPLOY</title>
    <style>
        body { background: #F5F0E8; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .test-btn { 
            padding: 20px 40px; 
            background: #363920; 
            color: white; 
            border: 5px solid red; /* IF YOU SEE THIS RED BORDER, IT WORKED */
            cursor: pointer; 
            font-size: 20px;
        }
        #intake { display: none; padding: 50px; background: white; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Testing Connection</h1>
    <button class="test-btn" onclick="start()">CLICK ME TO START</button>
    
    <div id="intake">
        <h2>IT WORKED!</h2>
        <p>The button is now talking to the code. We can now put the real design back in.</p>
    </div>

    <script>
        function start() {
            console.log("Button clicked");
            document.getElementById('intake').style.display = 'block';
        }
    </script>
</body>
</html>
